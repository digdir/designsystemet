packages:
  - packages/*
  - apps/*
  - plugins/*
  - internal/*
allowBuilds:
  "@biomejs/biome": true
  '@parcel/watcher': false
  '@swc/core': true
  rs-module-lexer: false
  style-dictionary: true
blockExoticSubdeps: true
injectWorkspacePackages: true
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@u-elements/*"
packageExtensions:
  "@navikt/aksel-icons":
    peerDependencies:
      react: ">=18.3.1 || ^19.0.0"
    peerDependenciesMeta:
      react:
        optional: true
patchedDependencies:
  '@oddbird/popover-polyfill': patches/@oddbird__popover-polyfill.patch
syncInjectedDepsAfterScripts:
  - build
  - build:all
  - build:www
  - build:themebuilder
  - build:storybook
useNodeVersion: "24.18.0"
