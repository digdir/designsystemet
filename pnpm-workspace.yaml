packages:
  - packages/*
  - apps/*
  - plugins/*
  - internal/*
allowBuilds:
  "@biomejs/biome": true
  '@parcel/watcher': false
  '@swc/core': true
  esbuild: true
  rs-module-lexer: false
  style-dictionary: true
blockExoticSubdeps: true
injectWorkspacePackages: true
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@u-elements/*"
  # Renovate security update: vite@7.3.5
  - vite@7.3.5
packageExtensions:
  "@navikt/aksel-icons":
    peerDependencies:
      react: ">=18.3.1 || ^19.0.0"
    peerDependenciesMeta:
      react:
        optional: true
syncInjectedDepsAfterScripts:
  - build
  - build:all
  - build:www
  - build:themebuilder
  - build:storybook
useNodeVersion: "24.16.0"
