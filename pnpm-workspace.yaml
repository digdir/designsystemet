packages:
  - packages/*
  - apps/*
  - plugins/*
  - internal/*
ignoredBuiltDependencies:
  - '@bundled-es-modules/glob'
  - '@parcel/watcher'
  - rs-module-lexer
  - sharp
injectWorkspacePackages: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@u-elements/*"
onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@swc/core'
  - esbuild
  - just-pnpm
  - style-dictionary
packageExtensions:
  '@navikt/aksel-icons':
    peerDependencies:
      react: ">=18.3.1 || ^19.0.0"
    peerDependenciesMeta:
      react:
        optional: true
syncInjectedDepsAfterScripts:
  - build
  - build:all
  - build:www
  - build:themebuilder
  - build:storybook
useNodeVersion: 24.15.0
