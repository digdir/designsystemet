name: Release

on:
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Create snapshot release"
        type: boolean
        default: true
      tag:
        description: "npm tag (for snapshot releases)"
        type: choice
        default: "test"
        options:
          - next
          - test
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  snapshot:
    name: Snapshot Release
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.snapshot == 'true' }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/gh-setup
      - name: Build
        run: pnpm build
      - name: Install ## running install again for designsystemt bin to be registered
        run: pnpm install --frozen-lockfile
        shell: bash
      - id: snapshot
        name: Set Snapshot Name
        run: |
          NAME="${{ github.ref_name }}"
          NAME="${NAME//\//-}"
          echo "name=${NAME}" >> $GITHUB_OUTPUT
      - id: publish
        name: Create Snapshot Release
        run: |
          pnpm changeset version --snapshot "${{ steps.snapshot.outputs.name }}"
          echo '---'
          echo 'Detected Changes:'
          git diff
          echo '---'
          pnpm run publish-packages --tag "${{ github.event.inputs.tag }}" --no-git-tag | tee publish.log
          {
            echo 'packages<<EOF'
            (grep -oE '@digdir/[^ ]+@[0-9][^ ]*' publish.log | sort -u || true)
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ""
      - name: Comment published packages on PR
        if: ${{ steps.publish.outputs.packages != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          TAG: ${{ github.event.inputs.tag }}
          PACKAGES: ${{ steps.publish.outputs.packages }}
        run: |
          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No open PR found for branch $BRANCH, skipping comment."
            exit 0
          fi
          MARKER="<!-- snapshot-release-comment -->"
          PUBLISHED_AT="$(TZ='Europe/Oslo' date '+%d.%m.%Y %H:%M:%S')"
          {
            echo "$MARKER"
            echo "### 📦 Snapshot release published"
            echo
            echo "Published at \`$PUBLISHED_AT\` to npm with tag \`$TAG\`:"
            echo
            echo "$PACKAGES" | while IFS= read -r pkg; do
              if [ -n "$pkg" ]; then
                name="${pkg%@*}"
                version="${pkg##*@}"
                echo "- [\`$pkg\`](https://www.npmjs.com/package/$name/v/$version)"
              fi
            done
            echo
            echo "Install with:"
            echo "$PACKAGES" | while IFS= read -r pkg; do
              if [ -n "$pkg" ]; then
                echo '```sh'
                echo "npm install ${pkg%@*}@$TAG"
                echo '```'
              fi
            done
          } > comment.md
          # Find an existing snapshot-release comment to update, otherwise create a new one
          COMMENT_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$MARKER\"))] | last | .id // empty")
          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment $COMMENT_ID"
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -F body=@comment.md > /dev/null
          else
            echo "No existing comment found, creating a new one"
            gh pr comment "$PR" --body-file comment.md
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.snapshot != 'true' }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/gh-setup
      - name: Build Designsystemet CLI
        run: pnpm build:types && pnpm build:cli
      - name: Install ## running install again for designsystemt bin to be registered
        run: pnpm install --frozen-lockfile
        shell: bash
      - name: Store release version for changeset
        id: release_version
        run: echo "VALUE=$(bash ./scripts/print_release_version.sh)" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        # Forked version of the changesets action that supports aggregated releases
        uses: dotansimha/changesets-action@069996e9be15531bd598272996fa23853d61590e # v1.5.2
        with:
          publish: pnpm publish-packages
          version: pnpm version-packages
          commit: "chore: new release"
          title: "chore: new release"
          createGithubReleases: aggregate
          githubReleaseName: v${{ steps.release_version.outputs.value }}
          githubTagName: v${{ steps.release_version.outputs.value }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: "" # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868

  deploy-www:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    uses: ./.github/workflows/azure-deploy-www.yml
    with:
      environment: "production"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      SLACK_INVITE_URL: ${{ secrets.SLACK_INVITE_URL }}
  deploy-theme:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    uses: ./.github/workflows/azure-deploy-themebuilder.yml
    with:
      environment: "production"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  deploy-storybook:
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    uses: ./.github/workflows/azure-deploy-storybook.yml
    with:
      environment: "production"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
